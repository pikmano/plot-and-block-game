name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # lets you trigger it manually from GitHub

env:
  GODOT_VERSION: 4.2.2
  EXPORT_PRESET: Android
  APK_NAME: plot-and-block

jobs:
  build-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/export_templates \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > /tmp/release.keystore

      - name: Inject keystore info into export preset
        run: |
          sed -i \
            "s|keystore/release=\"\"|keystore/release=\"/tmp/release.keystore\"|g" \
            project/export_presets.cfg
          sed -i \
            "s|keystore/release_user=\"\"|keystore/release_user=\"${{ secrets.ANDROID_KEYSTORE_ALIAS }}\"|g" \
            project/export_presets.cfg
          sed -i \
            "s|keystore/release_password=\"\"|keystore/release_password=\"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\"|g" \
            project/export_presets.cfg

      - name: Create output directory
        run: mkdir -p builds

      - name: Export APK (release signed)
        run: |
          cd project
          godot --headless --export-release "$EXPORT_PRESET" \
            "../builds/${APK_NAME}.apk" 2>&1
        continue-on-error: false

      - name: Verify APK was created
        run: |
          ls -lh builds/
          test -f "builds/${APK_NAME}.apk" && echo "✅ APK created successfully" \
            || (echo "❌ APK not found" && exit 1)

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-release
          path: builds/${{ env.APK_NAME }}.apk
          retention-days: 30

      # Also builds AAB (required for Google Play Store submission)
      - name: Export AAB for Google Play
        run: |
          sed -i \
            "s|export_path=\"builds/plot-and-block.apk\"|export_path=\"builds/plot-and-block.aab\"|g" \
            project/export_presets.cfg
          cd project
          godot --headless --export-release "$EXPORT_PRESET" \
            "../builds/${APK_NAME}.aab" 2>&1
        continue-on-error: true  # AAB is bonus; APK is the hard requirement

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-release-aab
          path: builds/${{ env.APK_NAME }}.aab
          retention-days: 30
        continue-on-error: true
